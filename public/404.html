<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LofiCouch — Redirecting...</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // Redirects 404s to index.html with the path stored in sessionStorage
      sessionStorage.redirect = location.href;
      location.replace(location.pathname.split('/').slice(0, -1).join('/') || '/');
    </script>
  </head>
  <body>
    <p>Redirecting to LofiCouch...</p>
  </body>
</html>
