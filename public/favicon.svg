<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="couchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Couch base -->
  <rect x="10" y="45" width="80" height="35" rx="8" fill="url(#couchGrad)"/>
  <!-- Couch back -->
  <rect x="10" y="30" width="80" height="20" rx="6" fill="#7c3aed"/>
  <!-- Couch arms -->
  <rect x="5" y="35" width="12" height="40" rx="5" fill="#7c3aed"/>
  <rect x="83" y="35" width="12" height="40" rx="5" fill="#7c3aed"/>
  <!-- Cushions -->
  <ellipse cx="35" cy="55" rx="15" ry="10" fill="#a78bfa" opacity="0.7"/>
  <ellipse cx="65" cy="55" rx="15" ry="10" fill="#a78bfa" opacity="0.7"/>
  <!-- Musical notes -->
  <text x="25" y="28" font-size="16" fill="#c4b5fd">♪</text>
  <text x="70" y="22" font-size="14" fill="#c4b5fd">♫</text>
  <text x="50" y="18" font-size="12" fill="#ddd6fe">♪</text>
  <!-- Legs -->
  <rect x="18" y="78" width="6" height="10" rx="2" fill="#5b21b6"/>
  <rect x="76" y="78" width="6" height="10" rx="2" fill="#5b21b6"/>
</svg>
